<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework 2 - CSS Grid & Flex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to Main Content</a>

    <header>
        <h1>My Styled Website</h1>
    </header>

    <nav>
        <img src="https://via.placeholder.com/150" alt="Site Logo">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="parks.html">Parks</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main id="main-content">
        
        <h2>Grid Layout (Two Columns)</h2>
        <div class="grid">
            <div class="card">
                <img src="https://via.placeholder.com/300" alt="Park view 1">
                <p>Описание парка в сетке.</p>
            </div>
            <div class="card">
                <img src="https://via.placeholder.com/300" alt="Park view 2">
                <p>Еще одно описание в сетке.</p>
            </div>
        </div>

        <hr>

        <h2>Flex Layout (Gallery)</h2>
        <div class="flex">
            <div class="flex-item">Item 1</div>
            <div class="flex-item">Item 2</div>
            <div class="flex-item">Item 3</div>
            <div class="flex-item">Item 4</div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Web Design Student</p>
    </footer>

</body>
</html>
